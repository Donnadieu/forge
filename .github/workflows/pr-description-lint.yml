name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR description format
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "::error::PR description is empty"
            exit 1
          fi

          # Check for required sections
          missing=""
          for section in "Context" "TL;DR" "Summary" "Test Plan"; do
            if ! echo "$PR_BODY" | grep -q "#### $section"; then
              missing="$missing $section"
            fi
          done

          if [ -n "$missing" ]; then
            echo "::error::PR description is missing required sections:$missing"
            echo "Required sections: Context, TL;DR, Summary, Test Plan"
            exit 1
          fi

          echo "PR description format looks good"
